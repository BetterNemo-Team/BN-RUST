<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetterNemo 设置</title>
  <link rel="stylesheet" href="fa.min.css" />
  <link rel="stylesheet" href="settings.css" />
  <script>
    const BetterNemoVersion = '260519.1'
  </script>
</head>
<body class="settings-window-body">
  <div class="settings-window">
    <div class="settings-window-header">
      <span class="settings-window-title">设置</span>
    </div>
    <div class="settings-window-body-inner" id="settingsContent"></div>
  </div>
  <script src="workspace-scripts/storage.js"></script>
  <script>
    // Load theme/extension configs like utils.js does
    function loadScript(src) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    (async function() {
      await loadScript('extensions/_CONFIG.js');
      await loadScript('theme/_CONFIG.js');
      await loadScript('workspace-scripts/utils.js');
      await loadScript('workspace-scripts/settings.js');
      if (window.openSettings) openSettings();
    })();
  </script>
</body>
</html>
