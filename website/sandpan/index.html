<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>砂盘 · 自动跳转</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --error: #ef4444;
            --pending: #f59e0b;
            --primary: #3b82f6;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --radius: 12px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 560px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 36px 32px 28px;
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .path-display {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            background: #f1f5f9;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 24px;
            word-break: break-all;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.85rem;
        }

        /* 检测状态区域 */
        .detection-status {
            margin-bottom: 20px;
        }

        .status-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 12px;
            text-align: center;
        }

        .node-status-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .node-status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .node-status-item .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .indicator.checking {
            background: var(--pending);
            animation: pulse 0.8s ease-in-out infinite;
        }

        .indicator.success {
            background: var(--success);
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
        }

        .indicator.fail {
            background: var(--error);
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.3);
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.6);
            }
        }

        .node-status-item .node-label {
            flex: 1;
            font-weight: 500;
            color: var(--text);
        }

        .node-status-item .node-result {
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .node-status-item.item-success {
            border-color: #bbf7d0;
            background: #f0fdf4;
        }

        .node-status-item.item-fail {
            border-color: #fecaca;
            background: #fef2f2;
            opacity: 0.7;
        }

        /* 全局状态消息 */
        .global-message {
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            transition: var(--transition);
        }

        .global-message.checking-msg {
            color: #b45309;
            background: #fffbeb;
            border: 1px solid #fde68a;
        }

        .global-message.success-msg {
            color: #15803d;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }

        .global-message.fail-msg {
            color: #b91c1c;
            background: #fef2f2;
            border: 1px solid #fecaca;
        }

        .jump-countdown {
            display: inline-block;
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            color: var(--primary);
        }

        /* 手动选择列表（检测失败后显示） */
        .fallback-section {
            display: none;
            margin-top: 8px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .fallback-section.visible {
            display: block;
        }

        .fallback-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: 0.03em;
        }

        .route-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .route-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            background: #fafbfc;
            text-decoration: none;
            color: inherit;
        }

        .route-item:hover {
            background: #eff6ff;
            border-color: #93c5fd;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.08);
            transform: translateY(-1px);
        }

        .route-item:active {
            transform: scale(0.985);
            transition: 0.1s ease;
        }

        .route-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .route-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }

        .route-url {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 340px;
        }

        .arrow {
            flex-shrink: 0;
            margin-left: 10px;
            font-size: 1.1rem;
            transition: transform 0.2s ease;
        }

        .route-item:hover .arrow {
            transform: translateX(3px);
        }

        .retry-btn {
            display: block;
            margin: 16px auto 0;
            padding: 10px 24px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
            letter-spacing: 0.02em;
        }

        .retry-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .retry-btn:active {
            background: #e2e8f0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 16px 20px;
            }
            .route-url {
                max-width: 200px;
            }
            .header h1 {
                font-size: 1.15rem;
            }
        }
    </style>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <span class="header-icon">🔍</span>
            <h1>节点可用性检测</h1>
        </div>

        <!-- 路径显示 -->
        <div class="path-display" id="pathDisplay">正在解析路径...</div>

        <!-- 全局状态消息 -->
        <div class="global-message checking-msg" id="globalMessage">
            ⏳ 正在检测节点可用性...
        </div>

        <!-- 节点检测状态列表 -->
        <div class="detection-status">
            <ul class="node-status-list" id="nodeStatusList">
                <!-- 动态填充 -->
            </ul>
        </div>

        <!-- 手动选择列表（检测全部失败后显示） -->
        <div class="fallback-section" id="fallbackSection">
            <div class="fallback-title">👇 请手动选择路线</div>
            <div class="route-list" id="routeList">
                <!-- 动态填充 -->
            </div>
            <button class="retry-btn" id="retryBtn">🔄 重新检测</button>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 后端服务列表 ====================
            // 修改此列表即可自定义节点（按优先级排序，自动跳转第一个可用节点）
            const BACKENDS = [
                { name: 'HP 主节点', url: 'http://sandpan.hppro1.hpnu.cn' },
                { name: '备用加速节点', url: 'http://sandpan.back1.idcfengye.com' }
            ];

            // 检测超时时间（毫秒）
            const CHECK_TIMEOUT = 4000;

            // DOM 元素
            const pathDisplayEl = document.getElementById('pathDisplay');
            const globalMessageEl = document.getElementById('globalMessage');
            const nodeStatusListEl = document.getElementById('nodeStatusList');
            const fallbackSectionEl = document.getElementById('fallbackSection');
            const routeListEl = document.getElementById('routeList');
            const retryBtnEl = document.getElementById('retryBtn');

            // 存储检测结果
            let detectionResults = [];
            // 是否已经触发跳转（防止重复跳转）
            let jumpTriggered = false;
            // 跳转倒计时引用
            let countdownInterval = null;

            // ==================== 工具函数 ====================

            /** 获取 URL 中的 path 参数（兼容 query 和 hash 模式） */
            function getTargetPath() {
                const urlParams = new URLSearchParams(window.location.search);
                let path = urlParams.get('path');
                if (path && path.trim() !== '') {
                    if (!path.startsWith('/')) path = '/' + path;
                    return path;
                }
                // 兼容 hash 模式：例如 #/some/path
                if (window.location.hash && window.location.hash.length > 1) {
                    let hashPath = window.location.hash.substring(1);
                    if (!hashPath.startsWith('/')) hashPath = '/' + hashPath;
                    return hashPath;
                }
                return null;
            }

            /** 拼接完整 URL */
            function buildFullUrl(baseUrl, path) {
                let cleanBase = baseUrl.replace(/\/$/, '');
                if (path) {
                    return cleanBase + path;
                }
                return cleanBase;
            }

            /** HTML 转义 */
            function escapeHtml(str) {
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // ==================== 更新路径显示 ====================
            function updatePathDisplay() {
                const targetPath = getTargetPath();
                if (targetPath) {
                    pathDisplayEl.textContent = '映射路径: ' + targetPath;
                } else {
                    pathDisplayEl.textContent = '无路径参数，将直接访问根目录';
                }
                return targetPath;
            }

            // ==================== 检测单个节点 ====================
            function checkNode(node, index, timeout) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeout);

                // 更新节点状态为"检测中"
                updateNodeStatusItem(index, 'checking', '检测中...');

                return fetch(node.url, {
                        mode: 'cors',
                        signal: controller.signal,
                        headers: {
                            'Accept': 'text/html'
                        }
                    })
                    .then((response) => {
                        if (!response.ok) {
                            clearTimeout(timeoutId);
                            return { index, success: false, url: node.url, name: node.name };
                        }
                        return response.text();
                    })
                    .then((html) => {
                        clearTimeout(timeoutId);
                        // 检查是否包含404页面特征
                        if (html && html.includes('<title>HP PRO | 404</title>')) {
                            return { index, success: false, url: node.url, name: node.name };
                        }
                        return { index, success: true, url: node.url, name: node.name };
                    })
                    .catch(() => {
                        clearTimeout(timeoutId);
                        return { index, success: false, url: node.url, name: node.name };
                    });
            }

            // ==================== 更新单个节点状态 UI ====================
            function updateNodeStatusItem(index, status, resultText) {
                const items = nodeStatusListEl.querySelectorAll('.node-status-item');
                if (index >= items.length) return;
                const item = items[index];
                const indicator = item.querySelector('.indicator');
                const resultEl = item.querySelector('.node-result');

                // 移除旧的状态类
                indicator.classList.remove('checking', 'success', 'fail');
                item.classList.remove('item-success', 'item-fail');

                if (status === 'checking') {
                    indicator.classList.add('checking');
                    resultEl.textContent = resultText || '检测中...';
                } else if (status === 'success') {
                    indicator.classList.add('success');
                    resultEl.textContent = resultText || '✅ 可用';
                    item.classList.add('item-success');
                } else if (status === 'fail') {
                    indicator.classList.add('fail');
                    resultEl.textContent = resultText || '❌ 不可达';
                    item.classList.add('item-fail');
                }
            }

            // ==================== 初始化节点状态列表 UI ====================
            function initNodeStatusList() {
                const html = BACKENDS.map((node, i) => `
                    <li class="node-status-item" data-index="${i}">
                        <span class="indicator checking"></span>
                        <span class="node-label">${escapeHtml(node.name)}</span>
                        <span class="node-result">等待检测...</span>
                    </li>
                `).join('');
                nodeStatusListEl.innerHTML = html;
            }

            // ==================== 设置全局消息 ====================
            function setGlobalMessage(type, html) {
                globalMessageEl.classList.remove('checking-msg', 'success-msg', 'fail-msg');
                if (type === 'checking') {
                    globalMessageEl.classList.add('checking-msg');
                } else if (type === 'success') {
                    globalMessageEl.classList.add('success-msg');
                } else if (type === 'fail') {
                    globalMessageEl.classList.add('fail-msg');
                }
                globalMessageEl.innerHTML = html;
            }

            // ==================== 执行跳转 ====================
            function doJump(url, nodeName) {
                if (jumpTriggered) return;
                jumpTriggered = true;

                // 清除倒计时
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }

                setGlobalMessage('success',
                    `✅ <strong>${escapeHtml(nodeName)}</strong> 可用，正在跳转...`
                );

                // 短暂延迟，让用户看到检测结果后再跳转
                setTimeout(() => {
                    window.location.href = url;
                }, 400);
            }

            // ==================== 渲染手动选择列表 ====================
            function renderFallbackRouteList(targetPath) {
                if (!BACKENDS || BACKENDS.length === 0) {
                    routeListEl.innerHTML =
                        '<div style="padding:20px;text-align:center;color:#64748b;">暂无可用路线</div>';
                    return;
                }

                const html = BACKENDS.map(item => {
                    const fullUrl = buildFullUrl(item.url, targetPath);
                    return `
                        <div class="route-item" data-url="${escapeHtml(fullUrl)}" title="点击跳转到 ${escapeHtml(fullUrl)}">
                            <div class="route-info">
                                <div class="route-name">${escapeHtml(item.name)}</div>
                                <div class="route-url">${escapeHtml(fullUrl)}</div>
                            </div>
                            <div class="arrow">➡️</div>
                        </div>
                    `;
                }).join('');

                routeListEl.innerHTML = html;

                // 绑定点击跳转事件
                routeListEl.querySelectorAll('.route-item').forEach(el => {
                    el.addEventListener('click', () => {
                        const url = el.getAttribute('data-url');
                        if (url) {
                            window.open(url, '_blank');
                        }
                    });
                });
            }

            // ==================== 主流程：检测并跳转 ====================
            async function detectAndJump(targetPath) {
                initNodeStatusList();
                setGlobalMessage('checking', '⏳ 正在检测节点可用性...');
                fallbackSectionEl.classList.remove('visible');

                // 并行检测所有节点
                const checkPromises = BACKENDS.map((node, i) =>
                    checkNode(node, i, CHECK_TIMEOUT)
                );

                // 等待所有检测完成
                const results = await Promise.all(checkPromises);
                detectionResults = results;

                // 更新所有节点的最终状态
                results.forEach(r => {
                    const status = r.success ? 'success' : 'fail';
                    const text = r.success ? '✅ 可用' : '❌ 不可达';
                    updateNodeStatusItem(r.index, status, text);
                });

                // 按数组顺序查找第一个可用节点
                const firstAvailable = results.find(r => r.success === true);

                if (firstAvailable) {
                    // 找到可用节点，自动跳转
                    const fullUrl = buildFullUrl(firstAvailable.url, targetPath);
                    doJump(fullUrl, firstAvailable.name);
                } else {
                    // 全部不可用
                    setGlobalMessage('fail',
                        '❌ 所有节点均不可达，请检查网络或手动选择路线重试'
                    );
                    fallbackSectionEl.classList.add('visible');
                    renderFallbackRouteList(targetPath);
                }
            }

            // ==================== 重新检测 ====================
            function retry() {
                jumpTriggered = false;
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                detectionResults = [];
                const targetPath = getTargetPath();
                detectAndJump(targetPath);
            }

            // ==================== 事件绑定 ====================
            retryBtnEl.addEventListener('click', retry);

            // ==================== 页面初始化 ====================
            function init() {
                const targetPath = updatePathDisplay();
                detectAndJump(targetPath);
            }

            // 启动
            init();
        })();
    </script>
</body>
</html>
